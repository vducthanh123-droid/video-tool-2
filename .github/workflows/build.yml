name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openai-whisper

      - name: Download FFmpeg
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extract"
          $ffmpeg = Get-ChildItem -Path "ffmpeg_extract" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpeg.FullName -Destination ".\\ffmpeg.exe"

      - name: Build EXE
        shell: pwsh
        run: |
          python -m PyInstaller --onefile --windowed --clean --collect-all whisper --collect-all torch --collect-all torchaudio --add-binary "ffmpeg.exe;." gui_pro.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: video-tool-exe
          path: dist/gui_pro.exe
